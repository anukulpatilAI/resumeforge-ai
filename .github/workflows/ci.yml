name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: resumeforge
          POSTGRES_USER: resumeforge
          POSTGRES_PASSWORD: resumeforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U resumeforge
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm --filter @resumeforge/api exec prisma generate
      - run: pnpm --filter @resumeforge/api exec prisma db push
      - run: pnpm lint
      - run: pnpm build
